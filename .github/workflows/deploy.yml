name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Package
        run: tar --exclude='.git' --exclude='node_modules' --exclude='.env' -czf release.tgz .

      - name: Send to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 2222
          source: release.tgz
          target: /tmp/

      - name: Deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 2222
          script: |
            mkdir -p /opt/stacks/wavedrum
            tar -xzf /tmp/release.tgz -C /opt/stacks/wavedrum/
            cd /opt/stacks/wavedrum
            docker compose -f docker-compose.prod.yml up -d --build
            docker image prune -f
